version: "3.9"

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CORS_ORIGINS=http://localhost:5173
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

  # Combined single-container mode (API + static frontend)
  # Use `docker compose up prod` instead of api+web
  prod:
    build:
      context: .
      target: prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    profiles:
      - prod
