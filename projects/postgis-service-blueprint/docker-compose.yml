services:
  database:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: spatial_blueprint
      POSTGRES_USER: spatial
      POSTGRES_PASSWORD: spatial
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spatial -d spatial_blueprint"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ./sql/service_views.sql:/docker-entrypoint-initdb.d/20-service_views.sql:ro
      - ./sql/sample_seed.sql:/docker-entrypoint-initdb.d/30-sample_seed.sql:ro
