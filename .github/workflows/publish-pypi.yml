name: Publish Geoprompt To PyPI

on:
  push:
    tags:
      - "geoprompt-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip build twine
          pip install -e "projects/geoprompt[dev,compare,overlay,projection]"

      - name: Run tests
        working-directory: projects/geoprompt
        run: python -m pytest -q

      - name: Build distributions
        working-directory: projects/geoprompt
        run: python -m build

      - name: Validate distribution metadata
        working-directory: projects/geoprompt
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: projects/geoprompt/dist/
