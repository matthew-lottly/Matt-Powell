name: Long Integration Tests

"on":
  workflow_dispatch:

jobs:
  long-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install numpy
          pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -e _strata_temp/src

      - name: Run long CHMP integration tests
        env:
          RUN_LONG_TESTS: '1'
        run: pytest -q tests/test_integration_chmp_long.py

      - name: Upload long-test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: long_test_logs
          path: |
            tests/test_integration_chmp_long.py
            ./**/pytest_report.log
