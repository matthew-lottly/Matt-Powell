name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system deps (pandoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install numpy
          pip install torch --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -e _strata_temp/src

      - name: Run tests
        run: pytest -q

      - name: Run pandoc converter
        working-directory: projects/strata/paper/submission_jmlr
        run: bash ./convert_with_pandoc.sh || true
