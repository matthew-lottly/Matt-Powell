---
name: "Container Build & Scan"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          target: api
          load: true
          tags: matthew-lottly/sports-sim:api-latest

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: matthew-lottly/sports-sim:api-latest
          format: 'table'
          exit-code: '0'

      - name: Build Web build image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          target: web-build
          load: true
          tags: matthew-lottly/sports-sim:web-build-latest

      - name: Scan Web-build image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: matthew-lottly/sports-sim:web-build-latest
          format: 'table'
          exit-code: '0'
